<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太极拳动作识别 - 分析结果</title>
    <style>
        :root {
            --tj-black: #1a1a1a;
            --tj-white: #fcfcfc;
            --tj-gold: #b2945e; /* 沉稳的金，代表专业性 */
            --success: #2d6a4f;
            --warn: #d97706;
            --error: #991b1b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: "Noto Serif SC", "PingFang SC", "Hiragino Sans GB", serif; 
            background-color: #f2f2f2;
            /* 背景背景：淡淡的宣纸纹理感 */
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.8) 0%, rgba(230,230,230,0.4) 100%),
                              url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0c16.568 0 30 13.432 30 30S46.568 60 30 60 0 46.568 0 30 13.432 0 30 0z' fill='%23000' fill-opacity='0.02'/%3E%3C/svg%3E");
            color: var(--tj-black);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        /* 顶部标题：水墨晕染感 */
        h1 { 
            font-size: 28px; 
            margin-bottom: 40px; 
            text-align: center; 
            letter-spacing: 4px;
            position: relative;
            padding-bottom: 15px;
        }
        h1::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--tj-black), transparent);
        }

        .result-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 24px; 
            margin-bottom: 40px; 
        }
        @media (min-width: 850px) { .result-grid { grid-template-columns: 1.2fr 0.8fr; } }

        /* 卡片设计：白描画卷风格 */
        .result-card { 
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 20px; 
            padding: 32px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .result-card h2 { 
            font-size: 18px; 
            margin-bottom: 24px; 
            display: flex;
            align-items: center;
            color: var(--tj-gold);
        }
        .result-card h2::before {
            content: "☯";
            margin-right: 10px;
            font-size: 20px;
        }

        /* 动作条目 */
        .action-item { 
            font-size: 16px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0; 
            border-bottom: 1px solid rgba(0,0,0,0.04); 
        }
        .action-item:last-child { border: none; }
        .action-item strong { color: #555; font-weight: 500; }

        /* 状态标签 */
        .status-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
        }
        .success { background: #ecfdf5; color: var(--success); }
        .warn { background: #fffbeb; color: var(--warn); }
        .error { background: #fef2f2; color: var(--error); }

        /* 调试盒子：复古经书/卷轴色 */
        .debug-box { 
            background: #27272a; 
            color: #a1a1aa; 
            padding: 20px; 
            border-radius: 12px; 
            font-family: "Consolas", monospace;
            font-size: 13px; 
            line-height: 1.6; 
            max-height: 400px;
            overflow-y: auto;
            border: 4px solid #18181b;
        }

        /* 底部导航 */
        .footer-nav {
            text-align: center;
            margin-top: 40px;
        }
        .back-btn { 
            display: inline-block; 
            padding: 14px 40px; 
            background: var(--tj-black); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .back-btn:hover { 
            transform: translateY(-2px);
            background: #333;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* 装饰元素 */
        .ink-decoration {
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 100px;
            color: rgba(0,0,0,0.02);
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>动作分析 · 禅定</h1>
        
        <div class="result-grid">
            <div class="result-card">
                <h2>身法判定</h2>
                {% if actions %}
                    {% for k, v in actions.items() %}
                        <div class="action-item">
                            <strong>{{ k }}</strong>
                            <span class="status-badge {% if '✅' in v %}success{% elif '⚠️' in v %}warn{% elif '❌' in v %}error{% endif %}">
                                {{ v }}
                            </span>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="action-item error">尚未检测到有效的太极意向，请确保人体完整入镜。</div>
                {% endif %}
                <div class="ink-decoration">太极</div>
            </div>

            <div class="result-card">
                <h2>系统回馈</h2>
                <p style="font-size: 12px; color: #999; margin-bottom: 12px;">底层视觉算法参数 (JSON 原始数据)</p>
                <div class="debug-box">
                    {{ result | tojson(indent=2) }}
                </div>
            </div>
        </div>

        <div class="footer-nav">
            <a href="/" class="back-btn">收势 · 返回重新分析</a>
        </div>
    </div>
</body>
</html>
