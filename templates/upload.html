<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太极拳动作识别 - 上传照片</title>
    <style>
        /* 全局样式重置与基础配置 */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            transition: all 0.3s ease; /* 全局过渡动画，提升丝滑感 */
        }
        :root {
            /* 主题色变量，方便统一修改 */
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
        }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            background: var(--bg);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 650px; 
            width: 100%;
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            padding: 40px 35px;
            position: relative;
            overflow: hidden;
        }
        /* 顶部装饰条，提升设计感 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--success));
        }
        h1 { 
            font-size: 28px; 
            color: var(--text-primary); 
            margin-bottom: 30px; 
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        /* 错误提示样式优化 */
        .flash { 
            background: #fef2f2; 
            color: var(--danger); 
            border: 1px solid #fecaca;
            padding: 14px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            text-align: center; 
            font-size: 15px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* 拍照提示框升级 */
        .tip-box { 
            background: #f0fdf4; 
            border: 1px solid #bbf7d0;
            border-radius: 16px; 
            padding: 22px 25px; 
            margin: 0 0 30px 0;
        }
        .tip-box h3 { 
            font-size: 18px; 
            color: var(--success); 
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tip-box ul { 
            font-size: 15px; 
            color: var(--text-secondary); 
            list-style: none; 
            line-height: 2;
        }
        .tip-box li {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tip-box li i {
            color: var(--success);
            font-size: 16px;
        }
        /* 上传区域大升级 */
        .upload-box { 
            border: 2px dashed var(--border); 
            border-radius: 16px; 
            padding: 50px 20px; 
            text-align: center; 
            margin: 0 0 20px 0;
            cursor: pointer; 
            background: #fafbfc;
        }
        .upload-box:hover { 
            border-color: var(--primary);
            background: #f8faff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }
        .upload-box.dragover {
            border-color: var(--primary);
            background: #f0f7ff;
            transform: scale(1.01);
        }
        .upload-box input { 
            display: none; 
        }
        .upload-box i { 
            font-size: 50px; 
            color: var(--primary); 
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .upload-text { 
            font-size: 17px; 
            color: var(--text-primary);
            font-weight: 500;
        }
        .upload-subtext {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        /* 文件名显示优化 */
        .file-name { 
            font-size: 15px; 
            color: var(--primary); 
            margin: 0 0 20px 0;
            text-align: center;
            font-weight: 500;
            padding: 8px 12px;
            background: #f0f7ff;
            border-radius: 8px;
            display: none; /* 默认隐藏，选择文件后显示 */
        }
        .file-name.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* 按钮样式升级 */
        .btn { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 17px; 
            font-weight: 600;
            cursor: pointer; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .btn:hover:not(:disabled) { 
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }
        .btn:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn:disabled { 
            background: var(--border); 
            cursor: not-allowed;
            box-shadow: none;
            color: var(--text-secondary);
        }
        /* 响应式适配 */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .upload-box {
                padding: 40px 15px;
            }
        }
    </style>
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>太极拳动作识别系统</h1>
        <!-- 错误提示 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <div class="flash">{{ m }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <!-- 拍照提示 -->
        <div class="tip-box">
            <h3><i class="fas fa-camera-retro"></i> 最佳拍照建议</h3>
            <ul>
                <li><i class="fas fa-check-circle"></i> 人物全身入镜，关节点（肩/膝/踝）清晰可见</li>
                <li><i class="fas fa-check-circle"></i> 背景简洁（纯色墙/天空），与人物有对比度</li>
                <li><i class="fas fa-check-circle"></i> 光线充足，避免逆光/过暗，单人拍摄</li>
                <li><i class="fas fa-check-circle"></i> 图片格式：JPG/PNG/BMP，大小≤4MB</li>
            </ul>
        </div>
        <!-- 上传表单 -->
        <form method="post" enctype="multipart/form-data" id="uploadForm">
            <label class="upload-box" for="fileInput">
                <i class="fas fa-cloud-upload-alt"></i>
                <div class="upload-text">点击选择图片 / 拖拽图片到此处</div>
                <div class="upload-subtext">支持 JPG、PNG、BMP 格式，单张最大 4MB</div>
                <input type="file" id="fileInput" name="file" accept="image/jpg,image/jpeg,image/png,image/bmp" required>
            </label>
            <div class="file-name" id="fileName"></div>
            <button type="submit" class="btn" id="submitBtn" disabled>上传并分析动作</button>
        </form>
    </div>

    <script>
        // 实时显示文件名+启用按钮
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const uploadBox = document.querySelector('.upload-box');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                // 额外校验文件大小（4MB）
                if (file.size > 4 * 1024 * 1024) {
                    fileName.innerText = `❌ 文件过大：${file.name}（最大支持4MB）`;
                    fileName.classList.add('show');
                    fileName.style.color = 'var(--danger)';
                    submitBtn.disabled = true;
                    return;
                }
                fileName.innerText = `✅ 已选择：${file.name}`;
                fileName.classList.add('show');
                fileName.style.color = 'var(--primary)';
                submitBtn.disabled = false;
            } else {
                fileName.innerText = "";
                fileName.classList.remove('show');
                submitBtn.disabled = true;
            }
        });

        // 拖拽上传
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                // 校验文件格式和大小
                const validTypes = ['image/jpeg', 'image/png', 'image/bmp'];
                if (!validTypes.includes(file.type)) {
                    fileName.innerText = `❌ 格式不支持：${file.name}（仅支持JPG/PNG/BMP）`;
                    fileName.classList.add('show');
                    fileName.style.color = 'var(--danger)';
                    submitBtn.disabled = true;
                    return;
                }
                if (file.size > 4 * 1024 * 1024) {
                    fileName.innerText = `❌ 文件过大：${file.name}（最大支持4MB）`;
                    fileName.classList.add('show');
                    fileName.style.color = 'var(--danger)';
                    submitBtn.disabled = true;
                    return;
                }
                fileInput.files = e.dataTransfer.files;
                fileName.innerText = `✅ 已选择：${file.name}`;
                fileName.classList.add('show');
                fileName.style.color = 'var(--primary)';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
