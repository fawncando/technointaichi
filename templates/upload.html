<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太极拳动作识别 - 上传照片</title>
    <style>
        /* 全局样式重置与基础配置 */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 更丝滑的过渡曲线 */
        }
        :root {
            /* 主题色变量（优化：新增太极青/灰，强化专业感） */
            --primary: #165DFF;
            --primary-light: #4080FF;
            --primary-ultralight: #E8F3FF;
            --success: #00B42A;
            --danger: #F53F3F;
            --bg: #F2F3F5;
            --card-bg: #FFFFFF;
            --text-primary: #1D2129;
            --text-secondary: #86909C;
            --border: #DCDFE6;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.1);
            --shadow-active: 0 2px 8px rgba(0, 0, 0, 0.12);
        }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif; 
            background: var(--bg);
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 680px; 
            width: 100%;
            background: var(--card-bg); 
            border-radius: 16px; /* 优化：更柔和的圆角 */
            box-shadow: var(--shadow); 
            padding: 32px 28px;
            position: relative;
            overflow: hidden;
        }
        /* 顶部装饰条（修复：渐变过渡更自然，无错位） */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--success), #70B7FF);
            border-radius: 16px 16px 0 0; /* 匹配容器圆角，消除视觉错位 */
        }
        h1 { 
            font-size: 26px; 
            color: var(--text-primary); 
            margin-bottom: 28px; 
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        /* 错误提示样式优化 */
        .flash { 
            background: #FFF1F0; 
            color: var(--danger); 
            border: 1px solid #FFEAE8;
            padding: 12px 16px; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            text-align: center; 
            font-size: 14px; 
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 拍照提示框升级（优化：视觉层次更清晰） */
        .tip-box { 
            background: var(--primary-ultralight); 
            border: 1px solid var(--primary-ultralight);
            border-radius: 12px; 
            padding: 20px 24px; 
            margin: 0 0 28px 0;
        }
        .tip-box h3 { 
            font-size: 16px; 
            color: var(--primary); 
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tip-box ul { 
            font-size: 14px; 
            color: var(--text-secondary); 
            list-style: none; 
            line-height: 1.8;
        }
        .tip-box li {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .tip-box li:last-child { margin-bottom: 0; }
        .tip-box li i {
            color: var(--success); 
            font-size: 16px;
            flex-shrink: 0; /* 防止图标挤压 */
        }
        /* 上传区域大升级（修复：拖拽状态蓝色框无错位，优化交互） */
        .upload-box { 
            border: 2px dashed var(--border); 
            border-radius: 12px; 
            padding: 48px 20px; 
            text-align: center; 
            margin: 0 0 16px 0;
            cursor: pointer; 
            background: #FAFAFA;
            position: relative; /* 修复：作为定位基准，防止子元素错位 */
        }
        /* 修复：拖拽状态蓝色框无错位，添加过渡动画 */
        .upload-box.dragover {
            border-color: var(--primary);
            background: var(--primary-ultralight);
            transform: scale(1.005); /* 轻微缩放，无错位 */
            box-shadow: var(--shadow-active);
        }
        .upload-box:hover { 
            border-color: var(--primary-light);
            background: #F8F9FA;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .upload-box input { 
            display: none; 
        }
        .upload-box i { 
            font-size: 48px; 
            color: var(--primary); 
            margin-bottom: 16px;
            opacity: 0.9;
        }
        .upload-text { 
            font-size: 16px; 
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 8px;
        }
        .upload-subtext {
            font-size: 13px;
            color: var(--text-secondary);
        }
        /* 文件名显示优化 */
        .file-name { 
            font-size: 14px; 
            color: var(--primary); 
            margin: 0 0 20px 0;
            text-align: center;
            font-weight: 500;
            padding: 10px 16px;
            background: var(--primary-ultralight);
            border-radius: 8px;
            display: none; /* 默认隐藏，选择文件后显示 */
            border: 1px solid rgba(22, 93, 255, 0.2);
        }
        .file-name.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* 按钮样式升级（优化：更贴合太极场景的柔和感） */
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(22, 93, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover:not(:disabled) { 
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(22, 93, 255, 0.25);
        }
        .btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(22, 93, 255, 0.15);
        }
        .btn:disabled { 
            background: var(--border); 
            cursor: not-allowed;
            box-shadow: none;
            color: var(--text-secondary);
        }
        .btn i { font-size: 18px; }
        /* 响应式适配（优化：移动端更紧凑） */
        @media (max-width: 768px) {
            body {
                padding: 16px 12px;
            }
            .container {
                padding: 24px 20px;
            }
            h1 {
                font-size: 22px;
            }
            .upload-box {
                padding: 36px 16px;
            }
            .upload-box i { font-size: 40px; }
            .tip-box { padding: 16px 20px; }
        }
        /* 优化：加载状态动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            animation: spin 1s linear infinite;
        }
    </style>
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>太极拳动作识别系统</h1>
        <!-- 错误提示 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <div class="flash">{{ m }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <!-- 拍照提示 -->
        <div class="tip-box">
            <h3><i class="fas fa-camera-retro"></i> 最佳拍照建议</h3>
            <ul>
                <li><i class="fas fa-check-circle"></i> 人物全身入镜，关节点（肩/膝/踝）清晰可见</li>
                <li><i class="fas fa-check-circle"></i> 背景简洁（纯色墙/天空），与人物有对比度</li>
                <li><i class="fas fa-check-circle"></i> 光线充足，避免逆光/过暗，单人拍摄</li>
                <li><i class="fas fa-check-circle"></i> 图片格式：JPG/PNG/BMP，大小≤4MB</li>
            </ul>
        </div>
        <!-- 上传表单 -->
        <form method="post" enctype="multipart/form-data" id="uploadForm">
            <!-- 修复：上传区域作为定位基准，蓝色框无错位 -->
            <label class="upload-box" for="fileInput" id="uploadLabel">
                <i class="fas fa-cloud-upload-alt"></i>
                <div class="upload-text">点击选择图片 / 拖拽图片到此处</div>
                <div class="upload-subtext">支持 JPG、PNG、BMP 格式，单张最大 4MB</div>
                <input type="file" id="fileInput" name="file" accept="image/jpg,image/jpeg,image/png,image/bmp" required>
            </label>
            <div class="file-name" id="fileName"></div>
            <button type="submit" class="btn" id="submitBtn" disabled>
                <i class="fas fa-upload"></i>
                上传并分析动作
            </button>
        </form>
    </div>

    <script>
        // 实时显示文件名+启用按钮
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const uploadLabel = document.getElementById('uploadLabel'); // 修复：获取上传区域标签

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                // 额外校验文件大小（4MB）
                if (file.size > 4 * 1024 * 1024) {
                    fileName.innerText = `❌ 文件过大：${file.name}（最大支持4MB）`;
                    fileName.classList.add('show');
                    fileName.style.color = 'var(--danger)';
                    submitBtn.disabled = true;
                    return;
                }
                fileName.innerText = `✅ 已选择：${file.name}`;
                fileName.classList.add('show');
                fileName.style.color = 'var(--primary)';
                submitBtn.disabled = false;
            } else {
                fileName.innerText = "";
                fileName.classList.remove('show');
                submitBtn.disabled = true;
            }
        });

        // 拖拽上传（修复：拖拽状态蓝色框无错位）
        uploadLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadLabel.classList.add('dragover'); // 修复：给标签添加类，而非父容器
        });

        uploadLabel.addEventListener('dragleave', () => {
            uploadLabel.classList.remove('dragover'); // 修复：移除类
        });

        uploadLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadLabel.classList.remove('dragover'); // 修复：移除类
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                // 校验文件格式和大小
                const validTypes = ['image/jpeg', 'image/png', 'image/bmp'];
                if (!validTypes.includes(file.type)) {
                    fileName.innerText = `❌ 格式不支持：${file.name}（仅支持JPG/PNG/BMP）`;
                    fileName.classList.add('show');
                    fileName.style.color = 'var(--danger)';
                    submitBtn.disabled = true;
                    return;
                }
                if (file.size > 4 * 1024 * 1024) {
                    fileName.innerText = `❌ 文件过大：${file.name}（最大支持4MB）`;
                    fileName.classList.add('show');
                    fileName.style.color = 'var(--danger)';
                    submitBtn.disabled = true;
                    return;
                }
                fileInput.files = e.dataTransfer.files;
                fileName.innerText = `✅ 已选择：${file.name}`;
                fileName.classList.add('show');
                fileName.style.color = 'var(--primary)';
                submitBtn.disabled = false;
            }
        });

        // 修复：点击上传区域空白处也能触发文件选择
        uploadLabel.addEventListener('click', (e) => {
            if (e.target === uploadLabel) {
                fileInput.click();
            }
        });
    </script>
</body>
</html>
