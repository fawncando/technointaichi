<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传照片 - 太极拳动作识别</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; padding: 24px; }
        .card { max-width: 560px; margin: 0 auto; padding: 24px; border: 1px solid #e5e7eb; border-radius: 10px; }
        h1 { font-size: 22px; margin-top: 0; }
        .tip { color: #6b7280; font-size: 14px; }
        input[type="file"] { margin: 12px 0; }
        button { padding: 8px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .flash { color: #b91c1c; margin-bottom: 8px; }
    </style>
    <!--
      简单上传页：提交到 / 使用 multipart/form-data
    -->
    <script>
        function onFileChange(e) {
            const file = e.target.files && e.target.files[0];
            const ok = !!file && /image\//.test(file.type);
            document.getElementById('submitBtn').disabled = !ok;
        }
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.querySelector('input[type="file"]');
            if (input) { input.addEventListener('change', onFileChange); }
        });
    </script>
    <script>
        // no-op; reserved for future client-side validations
    </script>
</head>
<body>
    <div class="card">
        <h1>上传你的太极拳动作照片</h1>
        <p class="tip">支持常见图片格式，清晰、完整的人体有助于识别。</p>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for m in messages %}
            <div class="flash">{{ m }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" required>
            <div>
                <button id="submitBtn" type="submit" disabled>上传并分析</button>
            </div>
        </form>
    </div>
</body>
</html>
